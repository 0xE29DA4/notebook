services:

  mongodb:
    image: mongodb/mongodb-community-server:8.2.6-ubi8-slim
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb

    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --username
        - ${MONGO_ROOT_USER}
        - --password
        - ${MONGO_ROOT_PASSWORD}
        - --authenticationDatabase
        - admin
        - --eval
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
